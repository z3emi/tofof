<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#6d0e16">
  <title>بدون اتصال - Tofof</title>
  <style>
    :root {
      --brand: #6d0e16;
      --bg: #f7f7f7;
      --text: #111827;
      --muted: #6b7280;
      --card: #ffffff;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      color: var(--brand);
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .btn {
      display: inline-block;
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/logo.png" alt="Tofof" class="logo">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تحقق من الشبكة ثم أعد المحاولة. بعض الصفحات المحفوظة ستعمل بدون اتصال.</p>
    <a href="/" class="btn">إعادة المحاولة</a>
  </main>
</body>
</html>
